<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scene Splitter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
    }

    textarea {
        width: 100%;
        height: 220px;
        padding: 15px;
        font-size: 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    .main-btn {
        margin-top: 15px;
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: white;
        cursor: pointer;
    }

    /* MAIN FIX */
    #cardsContainer {
        margin-top: 25px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-start;
    }

    .card {
        width: 260px;      /* fixed small width */
        height: 180px;     /* fixed small height */
        background: white;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .card h3 {
        margin: 0 0 8px;
        font-size: 14px;
    }

    .card-content {
        flex: 1;
        overflow-y: auto;
        font-size: 12px;
        line-height: 1.3;
        white-space: pre-wrap;
        border: 1px solid #eee;
        padding: 6px;
        border-radius: 6px;
    }

    .copy-btn {
        margin-top: 8px;
        padding: 6px;
        font-size: 12px;
        border: none;
        border-radius: 6px;
        background: #007bff;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Scene Splitter</h2>

<textarea id="inputText" placeholder="Paste full scene text here..."></textarea>
<br>
<button class="main-btn" onclick="splitScenes()">Split Scenes</button>

<div id="cardsContainer"></div>

<script>
function splitScenes() {
    const text = document.getElementById("inputText").value;
    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    const scenes = text.match(/Scene\s+\d+:.*?(?=Scene\s+\d+:|$)/gis);

    if (!scenes) {
        alert("No scenes found.");
        return;
    }

    scenes.forEach((sceneText, index) => {
        const titleMatch = sceneText.match(/Scene\s+\d+:.*/i);
        const title = titleMatch ? titleMatch[0] : `Scene ${index + 1}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${title}</h3>
            <div class="card-content">${sceneText}</div>
            <button class="copy-btn" onclick="copyScene(this)">Copy</button>
        `;

        container.appendChild(card);
    });
}

function copyScene(button) {
    const text = button.parentElement.querySelector(".card-content").innerText;

    navigator.clipboard.writeText(text).then(() => {
        button.innerText = "Copied!";
        setTimeout(() => {
            button.innerText = "Copy";
        }, 1000);
    });
}
</script>

</body>
</html>
